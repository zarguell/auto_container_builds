name: maglit

on:
  workflow_dispatch:
  schedule:
    - cron: "25 8 * * 0"


jobs:
  docker:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout documenso Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nayamamarshe/maglit
      - name: Install functions dependencies
        run: |
          cd functions
          npm install
          cd ..
      - name: Disable static generation for all Firebase pages
        run: |
          # Find all page files in the app directory
          find app -name "page.tsx" -o -name "page.ts" -o -name "page.jsx" -o -name "page.js" | while read file; do
            # Check if file contains firebase imports
            if grep -q "firebase" "$file"; then
              # Add force-dynamic if not already present
              if ! grep -q "export const dynamic" "$file"; then
                sed -i '1i export const dynamic = "force-dynamic";' "$file"
                echo "Added force-dynamic to $file"
              fi
            fi
          done
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      -
        name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push (MAIN)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/maglit:latest
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=dummy-key-for-build
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=dummy.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=dummy-project
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=dummy.appspot.com
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=123456789
            NEXT_PUBLIC_FIREBASE_APP_ID=1:123456789:web:abcdef
